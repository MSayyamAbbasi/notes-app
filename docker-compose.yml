services:
  mysql:
    image: mysql:8.4
    container_name: notes-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notes_db

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: notes-backend

    ports:
      - "5000:5000"

    depends_on:
      - mysql

    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: notes_db
      DB_USER: root
      DB_PASSWORD: root
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: dev_secret

  frontend:
    build: ./frontend
    container_name: notes-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mysql-data: